name: Integration — migrations & tests

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: prototype_jukebox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d prototype_jukebox" 
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/prototype_jukebox

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres
        run: |
          for i in `seq 1 30`; do
            if nc -z localhost 5432; then echo "postgres reachable" && break; fi
            echo "waiting for postgres..."; sleep 1
          done

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply Prisma migrations (deploy)
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: npx prisma migrate deploy --schema=prisma/schema.prisma

      - name: Run integration tests
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: npm run test:integration
